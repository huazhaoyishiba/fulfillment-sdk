# 测试配置：使用 H2 内嵌数据库，零外部依赖
spring:
  datasource:
    url: jdbc:h2:mem:fulfillment_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=true
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

# MyBatis 配置（测试需要）
mybatis:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.fulfillment: DEBUG
    org.springframework.jdbc: DEBUG
    org.mybatis: DEBUG

fulfillment:
  default-max-retry-count: 3
  handler-timeout-seconds: 30
  retry-backoff-base-seconds: 0
  processing-timeout-minutes: 1
